- title: "Data is infrastructure, not a feature"
  text: >-
    The most impactful data organizations are embedded in the business,
    not siloed as service desks. Data engineering should be a first-class
    strategic function with a seat at the planning table.

- title: "Invest in the multipliers"
  text: >-
    The best engineering leaders spend their time on the things that
    make everyone else faster — platforms, processes, and people
    development. Individual heroics don't scale.

- title: "Measure what matters"
  text: >-
    Vanity metrics obscure truth. I focus teams on leading indicators
    tied to business outcomes: time-to-insight, data freshness,
    pipeline reliability, and consumer satisfaction.

- title: "Build for the next 10× of scale"
  text: >-
    Architecture decisions should serve today's load and tomorrow's
    ambition. I design systems that handle 10× growth without
    re-architecture, while staying pragmatic about over-engineering.
