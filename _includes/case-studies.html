<section id="case-studies">
  <div class="container">
    <div class="section-label">Case Studies</div>
    <h2 class="section-title">Strategic Wins</h2>
    <p class="section-subtitle">
      Selected projects demonstrating the intersection of technical execution
      and business strategy.

</section>
