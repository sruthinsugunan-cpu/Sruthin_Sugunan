<header class="hero">
  <div class="hero-label">{{ site.data.hero.label }}</div>
  <h1>{{ site.data.hero.headline }}</h1>
  <p class="hero-description">{{ site.data.hero.description }}</p>
  <div class="hero-stats">
    {% for stat in site.data.hero.stats %}
    <div class="hero-stat">
      <div class="hero-stat-value">{{ stat.value }}</div>
      <div class="hero-stat-label">{{ stat.label }}</div>
    </div>
    {% endfor %}
  </div>
</header>

<hr class="divider">
